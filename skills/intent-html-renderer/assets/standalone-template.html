<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-subtle: #eef2f7;
        --ink: #17191f;
        --muted: #5f6673;
        --line: #d9dee7;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --accent-ink: #ffffff;
        --warn: #b45309;
        --good: #15803d;
        --radius: 8px;
        --shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      a,
      button,
      input,
      select,
      textarea {
        outline-color: var(--accent);
        outline-offset: 3px;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .surface {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 820px;
        margin-bottom: 8px;
        font-size: 3.5rem;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .lead {
        max-width: 720px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .cluster {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .panel {
        padding: 18px;
      }

      .button {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 700;
        padding: 0 14px;
        text-decoration: none;
      }

      .button.secondary {
        border-color: var(--line);
        background: var(--surface);
        color: var(--ink);
      }

      .badge {
        display: inline-flex;
        min-height: 26px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface-subtle);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        padding: 0 10px;
      }

      .scroller {
        max-width: 100%;
        overflow-x: auto;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 1180px);
          padding: 20px 0;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 2.25rem;
          line-height: 1.05;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">{{EYEBROW}}</p>
          <h1>{{HEADING}}</h1>
          <p class="lead">{{LEAD}}</p>
        </div>
      </header>

      {{BODY}}
    </main>

    <script>
      {{SCRIPT}}
    </script>
  </body>
</html>
