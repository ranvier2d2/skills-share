<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --bg: #f7f5ef;
        --surface: #ffffff;
        --ink: #191a1c;
        --muted: #62656b;
        --line: #d9d6cc;
        --accent: #0f766e;
        --accent-ink: #ffffff;
        --warn: #b45309;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      a,
      button {
        outline-color: var(--accent);
        outline-offset: 3px;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .surface {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 820px;
        margin-bottom: 8px;
        font-size: clamp(2rem, 6vw, 4.5rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .lead {
        max-width: 720px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        padding: 18px;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 1180px);
          padding: 20px 0;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">{{EYEBROW}}</p>
          <h1>{{HEADING}}</h1>
          <p class="lead">{{LEAD}}</p>
        </div>
      </header>

      {{BODY}}
    </main>

    <script>
      {{SCRIPT}}
    </script>
  </body>
</html>
